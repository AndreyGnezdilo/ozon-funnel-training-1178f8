  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-size:38px !important}\n    [style*=\"font-size: 30px\"]{font-size:26px !important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden\">\n  <div style=\"position:absolute;top:-260px;left:50%;width:920px;height:760px;margin-left:-460px;background:radial-gradient(circle,rgba(91,140,255,.20),transparent 62%);animation:floatGlow 20s ease-in-out infinite\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-180px;right:-140px;width:640px;height:640px;background:radial-gradient(circle,rgba(181,140,255,.15),transparent 62%);animation:floatGlow 26s ease-in-out infinite reverse\"><\u002Fdiv>\n  <div style=\"position:absolute;top:48%;left:-160px;width:520px;height:520px;background:radial-gradient(circle,rgba(70,224,208,.10),transparent 64%);animation:floatGlow 30s ease-in-out infinite\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:relative;z-index:1\">\n\n<nav style=\"position:sticky;top:0;z-index:50;background:rgba(8,10,16,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)\">\n  <div style=\"max-width:1060px;margin:0 auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:13px 22px\">\n    <div style=\"font-weight:800;font-size:14.5px;margin-right:auto;letter-spacing:-.01em\">Обучение менеджера <span style=\"color:#6f9bff\">маркетплейса<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:3px;flex-wrap:wrap;align-items:center\">\n      <a href=\"#m1\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Модуль 1<\u002Fa>\n      <a href=\"#calc1\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Воронка<\u002Fa>\n      <a href=\"#levers\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Рычаги<\u002Fa>\n      <span style=\"width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 5px\"><\u002Fspan>\n      <a href=\"#m2\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Модуль 2<\u002Fa>\n      <a href=\"#calc2\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Юнит-калькулятор<\u002Fa>\n      <span style=\"width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 5px\"><\u002Fspan>\n      <a href=\"#m3\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Модуль 3<\u002Fa>\n      <a href=\"#m3-rank\" style=\"font-size:13px;color:#9aa3b8;text-decoration:none;padding:7px 10px;border-radius:9px;font-weight:600;transition:.15s\" style-hover=\"background:rgba(255,255,255,.07);color:#eef1f8\">Ранжирование<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<header style=\"position:relative;padding:78px 0 52px\">\n  <div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.30em;text-transform:uppercase;color:#6f9bff;font-weight:600\">Базовый курс<\u002Fdiv>\n    <h1 style=\"font-size:clamp(34px,5.4vw,58px);line-height:1.04;letter-spacing:-.025em;font-weight:800;margin:18px 0 18px;max-width:940px\">Обучение менеджера<br><span style=\"background:linear-gradient(100deg,#5b8cff,#b58cff 50%,#46e0d0);-webkit-background-clip:text;background-clip:text;color:transparent\">маркетплейса<\u002Fspan><\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.6;color:#aab2c6;max-width:760px;margin:0\">Три базовых модуля, на которых строится всё дальше. Универсально для Ozon, Wildberries и Яндекс.Маркета: как привести покупателей, как считать на них деньги и как устроена операционка и продвижение.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px;margin-top:36px;max-width:1020px\">\n      <a href=\"#m1\" style=\"text-decoration:none;background:linear-gradient(180deg,rgba(91,140,255,.13),rgba(91,140,255,.03));border:1px solid rgba(91,140,255,.24);border-radius:16px;padding:20px 22px;display:block\" style-hover=\"border-color:rgba(91,140,255,.5)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6f9bff;font-weight:600;margin-bottom:7px\">Модуль 1<\u002Fdiv>\n        <div style=\"font-size:17px;font-weight:700;color:#eef1f8;margin-bottom:5px;letter-spacing:-.01em\">Воронка продаж<\u002Fdiv>\n        <div style=\"font-size:14px;color:#aeb6c8;line-height:1.5\">Как привести трафик и довести его до покупки. Этапы, конверсии, рычаги.<\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#m2\" style=\"text-decoration:none;background:linear-gradient(180deg,rgba(181,140,255,.13),rgba(181,140,255,.03));border:1px solid rgba(181,140,255,.24);border-radius:16px;padding:20px 22px;display:block\" style-hover=\"border-color:rgba(181,140,255,.5)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#c2a0ff;font-weight:600;margin-bottom:7px\">Модуль 2<\u002Fdiv>\n        <div style=\"font-size:17px;font-weight:700;color:#eef1f8;margin-bottom:5px;letter-spacing:-.01em\">Юнит-экономика<\u002Fdiv>\n        <div style=\"font-size:14px;color:#aeb6c8;line-height:1.5\">Как считать прибыль с каждой продажи и не уйти в минус.<\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#m3\" style=\"text-decoration:none;background:linear-gradient(180deg,rgba(70,224,208,.13),rgba(70,224,208,.03));border:1px solid rgba(70,224,208,.24);border-radius:16px;padding:20px 22px;display:block\" style-hover=\"border-color:rgba(70,224,208,.5)\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5fd7c8;font-weight:600;margin-bottom:7px\">Модуль 3<\u002Fdiv>\n        <div style=\"font-size:17px;font-weight:700;color:#eef1f8;margin-bottom:5px;letter-spacing:-.01em\">Операционка и продвижение<\u002Fdiv>\n        <div style=\"font-size:14px;color:#aeb6c8;line-height:1.5\">Путь товара, логистика, SEO, акции, реклама и ранжирование.<\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ МОДУЛЬ 1 BAND ============ -->\n<section id=\"m1\" data-reveal=\"\" style=\"position:relative;padding:46px 0;background:linear-gradient(180deg,rgba(6,36,63,.6),rgba(10,15,30,.25));border-top:1px solid rgba(91,140,255,.18);border-bottom:1px solid rgba(91,140,255,.12)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#7ee0a8;font-weight:600\">Модуль 1<\u002Fdiv>\n  <h2 style=\"font-size:clamp(26px,3.6vw,36px);font-weight:800;letter-spacing:-.02em;margin:10px 0 10px\">Воронка продаж и управление конверсией<\u002Fh2>\n  <p style=\"color:#cdd9e5;font-size:16px;margin:0;max-width:780px;line-height:1.6\">Единая модель, через которую дальше смотрим на любые цифры, рекламу, цену и аналитику. Без неё всё остальное — набор разрозненных метрик.<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<!-- A. Модель -->\n<section id=\"model\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#5b8cff,#7aa2ff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(91,140,255,.5)\">A<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Модель — как думать о бизнесе<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:760px\">Суть любого бизнеса в e-commerce — одна формула. Всё остальное в модуле раскрывает её.<\u002Fp>\n\n  <div style=\"text-align:center;font-size:clamp(17px,2.3vw,24px);font-weight:700;letter-spacing:-.01em;padding:30px 26px;border-radius:18px;background:linear-gradient(135deg,rgba(91,140,255,.14),rgba(181,140,255,.07));border:1px solid rgba(91,140,255,.22);margin:18px 0;line-height:1.5\">\n    Купить трафик <span style=\"color:#6f9bff\">→<\u002Fspan> провести по воронке <span style=\"color:#6f9bff\">→<\u002Fspan> получить <span style=\"background:linear-gradient(100deg,#5b8cff,#46e0d0);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800\">прибыль<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"border-left:3px solid #5b8cff;background:rgba(91,140,255,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8cfde\"><b style=\"color:#fff\">Цель — прибыль, а не выручка.<\u002Fb> Можно лить много трафика, делать большой оборот и работать в минус, если трафик стоит дороже маржи. Задача селлера: купить трафик так, чтобы прибыль с него превышала его стоимость + себестоимость + расходы.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Что такое воронка<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Последовательность этапов от «увидел товар» до «купил и оставил себе». На каждом этапе часть людей отваливается — поэтому воронка: широкая сверху, узкая снизу.<\u002Fp>\n\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:16px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><sc-for list=\"{{ funnelStages }}\" as=\"r\" hint-placeholder-count=\"5\">\n        <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:42px\">#<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Этап<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Что значит<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#6f9bff;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">{{ r.n }}<\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14.5px\">{{ r.name }}<\u002Fb><\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">{{ r.desc }}<\u002Ftd>\n        <\u002Ftr>\n      \n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#e8d9c0\"><b style=\"color:#ffc873\">Заказ ≠ выкуп.<\u002Fb> Человек может заказать и не выкупить: отменить, не прийти на ПВЗ, вернуть. Деньги в кассе — только выкуп. Поэтому % выкупа — отдельная важная метрика (особенно одежда/обувь).<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Конверсии между этапами<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Между соседними этапами — <b style=\"color:#fff\">конверсия<\u002Fb> = (следующий этап) / (предыдущий), в %.<\u002Fp>\n\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:16px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><sc-for list=\"{{ conversions }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Переход<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Метрика<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Формула<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">О чём говорит<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#c4ccdb;font-size:14px;vertical-align:top\">{{ r.trans }}<\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#6f9bff;font-weight:700;font-size:14px\">{{ r.metric }}<\u002Fb><\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-family:'JetBrains Mono',monospace;font-size:12.5px;vertical-align:top\">{{ r.formula }}<\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">{{ r.means }}<\u002Ftd>\n        <\u002Ftr>\n      \n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n  <p style=\"font-size:13px;color:#8b93a8;margin:8px 0\"><b style=\"color:#c4ccdb\">CTR = Click-Through Rate<\u002Fb> (коэффициент кликабельности), а не «Click Throw Rate».<\u002Fp>\n\n  <div style=\"border-left:3px solid #5b8cff;background:rgba(91,140,255,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8cfde\"><b style=\"color:#fff\">Воронка мультипликативна.<\u002Fb> Итог = CTR × CR_корзина × CR_заказ × %выкупа — это <b style=\"color:#fff\">произведение<\u002Fb>, не сумма. Слабое звено бьёт по всей цепочке. Поэтому работа селлера — найти и починить <b style=\"color:#fff\">самый слабый этап<\u002Fb>, а не «лить больше трафика» вслепую. ↓ Покрути это в калькуляторе ниже.<\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin-top:8px\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:22px 24px;box-shadow:0 12px 36px rgba(0,0,0,.35)\">\n      <h3 style=\"font-size:18px;font-weight:700;margin:0 0 6px;letter-spacing:-.01em\">Воронка универсальна<\u002Fh3>\n      <p style=\"font-size:13.5px;color:#8b93a8;margin:6px 0 12px\">Её видно и в офлайне. Офлайн-магазин:<\u002Fp>\n      <sc-for list=\"{{ offlineMap }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n        <thead><tr>\n          <th style=\"padding:9px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;border-bottom:1px solid rgba(255,255,255,.1)\">E-com<\u002Fth>\n          <th style=\"padding:9px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;border-bottom:1px solid rgba(255,255,255,.1)\">Офлайн-магазин<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr>\n              <td style=\"padding:9px 10px;border-top:1px solid rgba(255,255,255,.05);color:#cdd4e3;font-weight:600;font-size:13.5px\">{{ r.ecom }}<\u002Ftd>\n              <td style=\"padding:9px 10px;border-top:1px solid rgba(255,255,255,.05);color:#9aa3b8;font-size:13.5px\">{{ r.tent }}<\u002Ftd>\n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n      <p style=\"font-size:13px;color:#8b93a8;margin:12px 0 0\">Место магазина = бюджет на трафик. Витрина = CTR.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:22px 24px;box-shadow:0 12px 36px rgba(0,0,0,.35)\">\n      <h3 style=\"font-size:18px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Свой сайт vs маркетплейс<\u002Fh3>\n      <p style=\"font-size:13.5px;color:#aeb6c8;margin:8px 0;line-height:1.55\"><b style=\"color:#eef1f8\">Свой сайт:<\u002Fb> сам нагоняешь трафик (реклама, SEO). Всё твоё, но и вся работа твоя.<\u002Fp>\n      <p style=\"font-size:13.5px;color:#aeb6c8;margin:8px 0;line-height:1.55\"><b style=\"color:#eef1f8\">Маркетплейс:<\u002Fb> приходишь на готовый сайт, куда МП уже нагнал трафик (ТВ, билборды, звёзды, приложение). Покупаешь этот трафик за комиссию.<\u002Fp>\n      <div style=\"border-left:3px solid #46e0d0;background:rgba(70,224,208,.07);padding:12px 14px;border-radius:0 10px 10px 0;margin:12px 0 0;font-size:13px;line-height:1.55;color:#c8cfde\"><b style=\"color:#fff\">Бизнес МП:<\u002Fb> нагнать трафик → перепродать селлерам.<br><b style=\"color:#fff\">Бизнес селлера:<\u002Fb> купить трафик у МП → эффективно сконвертировать в прибыль. Мы не владеем трафиком — мы его конвертируем.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:34px 0 12px;letter-spacing:-.01em\">Трафик: горячий и холодный<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,122,122,.07),rgba(255,255,255,.015));border:1px solid rgba(255,122,122,.22);border-radius:18px;padding:20px 22px\">\n      <span style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px;background:rgba(255,122,122,.16);color:#ff9a9a;margin-bottom:10px\">ГОРЯЧИЙ<\u002Fspan>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:0;line-height:1.55\">Человек уже ищет такой товар, потребность осознана. Пример: ищет «крем для век» → видит твой крем. Готов покупать → высокая конверсия.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(111,182,255,.07),rgba(255,255,255,.015));border:1px solid rgba(111,182,255,.22);border-radius:18px;padding:20px 22px\">\n      <span style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px;background:rgba(111,182,255,.16);color:#8fc4ff;margin-bottom:10px\">ХОЛОДНЫЙ<\u002Fspan>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:0;line-height:1.55\">Не искал и не думал. Пример: рилсы с мемами → показ крема. Посмотрит, но клик и покупка маловероятны. Дёшево и много → для охвата и разогрева.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:34px 0 12px;letter-spacing:-.01em\">На маркетплейсе: поисковый и рекомендательный<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,122,122,.07),rgba(255,255,255,.015));border:1px solid rgba(255,122,122,.22);border-radius:18px;padding:20px 22px\">\n      <span style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;padding:4px 11px;border-radius:20px;background:rgba(255,122,122,.16);color:#ff9a9a;margin-bottom:10px\">ПОИСКОВЫЙ = ГОРЯЧИЙ<\u002Fspan>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:0;line-height:1.55\">Сам вбил запрос. Конверсионный. <b style=\"color:#eef1f8\">Дороже<\u002Fb> и за показ, и за клик: (1) МП ставит выше минимальную ставку за поиск by design; (2) конкуренция догоняет ставки сверх минимума.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(111,182,255,.07),rgba(255,255,255,.015));border:1px solid rgba(111,182,255,.22);border-radius:18px;padding:20px 22px\">\n      <span style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;padding:4px 11px;border-radius:20px;background:rgba(111,182,255,.16);color:#8fc4ff;margin-bottom:10px\">РЕКОМЕНДАТЕЛЬНЫЙ = ХОЛОДНЕЕ<\u002Fspan>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:0;line-height:1.55\">МП сам подмешивает в ленту/главную («вам понравится», «с этим покупают»). Дешевле, объёма много, для охвата и новинок. Конверсия ниже.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:13.5px;color:#8b93a8;margin:14px 0 0;line-height:1.55\">⚠️ Внешний трафик (блогеры, VK, Telegram) даёт объём заказов, <b style=\"color:#c4ccdb\">но конвертит хуже внутреннего<\u002Fb> — он холоднее. Ценен охватом, не конверсией.<\u002Fp>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:34px 0 12px;letter-spacing:-.01em\">Экономика трафика — без неё «прибыль» не посчитать<\u002Fh3>\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:8px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><sc-for list=\"{{ economics }}\" as=\"r\" hint-placeholder-count=\"5\">\n        <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:90px\">Метрика<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Расшифровка<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Смысл<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px\">{{ r.metric }}<\u002Fb><\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#cdd4e3;font-size:14px;line-height:1.5;vertical-align:top\">{{ r.full }}<\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#9aa3b8;font-size:14px;line-height:1.5;vertical-align:top\">{{ r.sense }}<\u002Ftd>\n        <\u002Ftr>\n      \n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Калькулятор воронки -->\n<section id=\"calc1\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-size:18px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#46e0d0,#5b8cff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">★<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Калькулятор воронки<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:760px\">Покрути ползунки конверсий и смотри, как меняется число выкупов (деньги). Красным подсветится самое слабое звено — то, что в первую очередь чинят.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:26px;box-shadow:0 16px 44px rgba(0,0,0,.4)\">\n    <div>\n      <div style=\"margin:0 0 18px\">\n        <label style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Показы <span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace\">{{ vImp }}<\u002Fspan><\u002Flabel>\n        <input type=\"range\" min=\"10000\" max=\"500000\" step=\"10000\" value=\"{{ imp }}\" oninput=\"{{ setImp }}\">\n      <\u002Fdiv>\n      <div style=\"margin:0 0 18px\">\n        <label style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">CTR · показ→клик <span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace\">{{ vCtr }}<\u002Fspan><\u002Flabel>\n        <input type=\"range\" min=\"0.5\" max=\"15\" step=\"0.1\" value=\"{{ ctr }}\" oninput=\"{{ setCtr }}\">\n      <\u002Fdiv>\n      <div style=\"margin:0 0 18px\">\n        <label style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">CR в корзину <span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace\">{{ vCr1 }}<\u002Fspan><\u002Flabel>\n        <input type=\"range\" min=\"2\" max=\"60\" step=\"1\" value=\"{{ cr1 }}\" oninput=\"{{ setCr1 }}\">\n      <\u002Fdiv>\n      <div style=\"margin:0 0 18px\">\n        <label style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">CR в заказ <span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace\">{{ vCr2 }}<\u002Fspan><\u002Flabel>\n        <input type=\"range\" min=\"5\" max=\"90\" step=\"1\" value=\"{{ cr2 }}\" oninput=\"{{ setCr2 }}\">\n      <\u002Fdiv>\n      <div style=\"margin:0\">\n        <label style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">% выкупа <span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace\">{{ vBuy }}<\u002Fspan><\u002Flabel>\n        <input type=\"range\" min=\"20\" max=\"98\" step=\"1\" value=\"{{ buy }}\" oninput=\"{{ setBuy }}\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"margin-bottom:4px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-size:13px;font-weight:700;color:#cdd4e3\">Показы<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#eef1f8\">{{ cImp }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:38px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden\"><div style=\"height:100%;width:{{ wImp }};background:linear-gradient(90deg,#3a6fff,#6f9bff);display:flex;align-items:center;padding-left:13px;color:#fff;font-weight:700;font-size:12.5px;transition:width .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 22px rgba(91,140,255,.4)\">показы<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ kCtr.style }}\"><span style=\"opacity:.55\">↓<\u002Fspan> CTR · показ → клик · <b style=\"font-weight:700\">{{ kCtr.pct }}<\u002Fb><sc-if value=\"{{ kCtr.weak }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:4px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;background:#ff5b5b;color:#fff;padding:2px 8px;border-radius:6px;animation:glowPulse 1.6s infinite\">слабое звено<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <div style=\"margin-bottom:4px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-size:13px;font-weight:700;color:#cdd4e3\">Клики<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#eef1f8\">{{ cClick }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:38px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden\"><div style=\"height:100%;width:{{ wClick }};background:linear-gradient(90deg,#3a6fff,#6f9bff);display:flex;align-items:center;padding-left:13px;color:#fff;font-weight:700;font-size:12.5px;transition:width .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 22px rgba(91,140,255,.4)\">клики<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ kCr1.style }}\"><span style=\"opacity:.55\">↓<\u002Fspan> CR в корзину · <b style=\"font-weight:700\">{{ kCr1.pct }}<\u002Fb><sc-if value=\"{{ kCr1.weak }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:4px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;background:#ff5b5b;color:#fff;padding:2px 8px;border-radius:6px;animation:glowPulse 1.6s infinite\">слабое звено<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <div style=\"margin-bottom:4px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-size:13px;font-weight:700;color:#cdd4e3\">В корзину<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#eef1f8\">{{ cCart }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:38px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden\"><div style=\"height:100%;width:{{ wCart }};background:linear-gradient(90deg,#4a7bf0,#7aa2ff);display:flex;align-items:center;padding-left:13px;color:#fff;font-weight:700;font-size:12.5px;transition:width .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 22px rgba(91,140,255,.35)\">корзина<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ kCr2.style }}\"><span style=\"opacity:.55\">↓<\u002Fspan> CR в заказ · <b style=\"font-weight:700\">{{ kCr2.pct }}<\u002Fb><sc-if value=\"{{ kCr2.weak }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:4px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;background:#ff5b5b;color:#fff;padding:2px 8px;border-radius:6px;animation:glowPulse 1.6s infinite\">слабое звено<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <div style=\"margin-bottom:4px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-size:13px;font-weight:700;color:#cdd4e3\">Заказы<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#eef1f8\">{{ cOrd }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:38px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden\"><div style=\"height:100%;width:{{ wOrd }};background:linear-gradient(90deg,#5a86e8,#8fb0ff);display:flex;align-items:center;padding-left:13px;color:#fff;font-weight:700;font-size:12.5px;transition:width .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 22px rgba(91,140,255,.3)\">заказ<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{ kBuy.style }}\"><span style=\"opacity:.55\">↓<\u002Fspan> % выкупа · <b style=\"font-weight:700\">{{ kBuy.pct }}<\u002Fb><sc-if value=\"{{ kBuy.weak }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:4px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;background:#ff5b5b;color:#fff;padding:2px 8px;border-radius:6px;animation:glowPulse 1.6s infinite\">слабое звено<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <div style=\"margin-bottom:4px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\"><span style=\"font-size:13px;font-weight:700;color:#7ee0a8\">Выкупы · деньги<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#7ee0a8\">{{ cBuy }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:38px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden\"><div style=\"height:100%;width:{{ wBuy }};background:linear-gradient(90deg,#1f9d57,#57e08f);display:flex;align-items:center;padding-left:13px;color:#06120b;font-weight:800;font-size:12.5px;transition:width .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 24px rgba(87,224,143,.45)\">выкуп<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(135deg,#0a1f18,#06243f);border:1px solid rgba(87,224,143,.25);border-radius:14px;padding:16px 18px;margin-top:16px\">\n        <span style=\"font-size:14px;color:#cdd4e3\">Итоговая конверсия показ→выкуп: <\u002Fspan><b style=\"font-size:26px;color:#7ee0a8;font-family:'JetBrains Mono',monospace;font-weight:700\">{{ total }}<\u002Fb>\n        <div style=\"font-size:12.5px;color:#8fa3b8;margin-top:6px;line-height:1.5\">Это произведение всех конверсий. Подними самое слабое звено — итог вырастет сильнее всего.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Рычаги band -->\n<section data-reveal=\"\" style=\"position:relative;padding:50px 0;background:linear-gradient(180deg,rgba(6,36,63,.55),rgba(10,15,30,.2));border-bottom:1px solid rgba(91,140,255,.18)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <h2 style=\"font-size:clamp(23px,3vw,30px);font-weight:800;letter-spacing:-.018em;margin:0 0 8px\">У каждого этапа — свои рычаги<\u002Fh2>\n  <p style=\"color:#aab2c6;font-size:16px;margin:0 0 18px;max-width:780px;line-height:1.6\">Итог = произведение конверсий, чинить надо слабое звено. Значит управление бизнесом = управление факторами на каждом этапе. Дальше — рычаги поимённо.<\u002Fp>\n  <div style=\"border-left:3px solid #57e08f;background:rgba(87,224,143,.08);padding:16px 20px;border-radius:0 14px 14px 0;font-size:15px;line-height:1.6;color:#d6e3da\"><b style=\"color:#7ee0a8\">Принцип менеджера:<\u002Fb> найти этап, который проседает сильнее всего относительно нормы/конкурентов, и чинить именно его — это даёт максимальный прирост на единицу усилий.<\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- B. Рычаги -->\n<section id=\"levers\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#b58cff,#8a6fff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(181,140,255,.45)\">B<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Рычаги — что крутить на каждом этапе<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 18px;max-width:780px\">Жми на этапы, чтобы раскрыть.<\u002Fp>\n\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:0 0 18px;font-size:15px;line-height:1.6;color:#e8d9c0\"><b style=\"color:#ffc873\">Сначала ЦА, потом тесты.<\u002Fb> У разных аудиторий разное поведение (пол, ниша): в бьюти одна логика, в садовых стульях — другая. Чужие «выигрышные» решения слепо не копировать. Любой тест начинается с вопроса «кто мой покупатель».<\u002Fdiv>\n\n  <sc-for list=\"{{ levers }}\" as=\"acc\" hint-placeholder-count=\"5\">\n    <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;margin:12px 0;background:rgba(255,255,255,.02)\">\n      <button onclick=\"{{ acc.toggle }}\" style=\"width:100%;text-align:left;padding:17px 20px;background:none;border:0;font-size:16px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:#eef1f8;font-family:inherit\" style-hover=\"background:rgba(255,255,255,.03)\">\n        <span style=\"display:flex;align-items:center;gap:12px\"><span style=\"{{ acc.numStyle }}\">{{ acc.n }}<\u002Fspan>{{ acc.title }}<\u002Fspan>\n        <span style=\"{{ acc.chev }}\">▾<\u002Fspan>\n      <\u002Fbutton>\n      <div style=\"{{ acc.body }}\"><div style=\"padding:0 20px 18px\">\n        <sc-if value=\"{{ acc.intro }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:13.5px;color:#8b93a8;margin:4px 0 10px\">{{ acc.intro }}<\u002Fp><\u002Fsc-if>\n        <sc-for list=\"{{ acc.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:minmax(150px,220px) 1fr;gap:14px;padding:10px 0;border-top:1px solid rgba(255,255,255,.06)\">\n            <div style=\"font-weight:700;color:#eef1f8;font-size:14px\">{{ r.term }}<\u002Fdiv>\n            <div style=\"color:#aeb6c8;font-size:14px;line-height:1.5\">{{ r.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ acc.note }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:13px;color:#8b93a8;margin:12px 0 0;line-height:1.55\">{{ acc.note }}<\u002Fp><\u002Fsc-if>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Матрица -->\n<section id=\"matrix\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-size:17px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#5b8cff,#b58cff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(91,140,255,.45)\">⊞<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Матрица: рычаг → этап<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:780px\">Цена, отзывы и рейтинг работают почти на всех этапах сразу — это самые мощные рычаги. Фото и упаковка бьют точечно.<\u002Fp>\n\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><sc-for list=\"{{ matrixRows }}\" as=\"r\" hint-placeholder-count=\"14\">\n        <\u002Fsc-for><sc-for list=\"{{ r.cells }}\" as=\"c\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">Рычаг<\u002Fth>\n      <th style=\"padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">Показы<\u002Fth>\n      <th style=\"padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">CTR<\u002Fth>\n      <th style=\"padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">Корзина/Заказ<\u002Fth>\n      <th style=\"padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">Выкуп<\u002Fth>\n      <th style=\"padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.12)\">Отзыв<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n          <td style=\"padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);font-weight:700;color:#dce2ee;font-size:13.5px\">{{ r.lever }}<\u002Ftd>\n          <td style=\"padding:10px 8px;border-top:1px solid rgba(255,255,255,.05);text-align:center\"><sc-if value=\"{{ c }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#57e08f;font-weight:800;font-size:15px\">✓<\u002Fspan><\u002Fsc-if><\u002Ftd>\n          \n        <\u002Ftr>\n      \n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Тест Модуль 1 -->\n<section id=\"quiz1\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div id=\"quiz1-top\" style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-size:17px;font-weight:700;color:#06120b;background:linear-gradient(135deg,#57e08f,#46e0d0);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(87,224,143,.45)\">✓<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Тест по Модулю 1<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 18px;max-width:780px\">Выбери ответ в каждом вопросе и нажми «Проверить». Увидишь количество правильных и разбор.<\u002Fp>\n\n  <sc-if value=\"{{ q1.scoreShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div id=\"quiz1-score\" style=\"{{ q1.scoreBoxStyle }}\">\n      <div style=\"font-size:46px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1\"><span>{{ q1.score }}<\u002Fspan> / {{ q1.total }}<\u002Fdiv>\n      <div style=\"font-size:19px;margin-top:8px;font-weight:700\">{{ q1.verdict }}<\u002Fdiv>\n      <div style=\"opacity:.92;margin-top:6px;font-size:14.5px\">{{ q1.scoreSub }}<\u002Fdiv>\n      <div style=\"height:9px;background:rgba(255,255,255,.25);border-radius:6px;overflow:hidden;margin:16px auto 0;max-width:420px\"><div style=\"height:100%;width:{{ q1.progWidth }};background:#fff;border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1)\"><\u002Fdiv><\u002Fdiv>\n      <button onclick=\"{{ q1.retake }}\" style=\"margin-top:18px;background:#fff;color:#0b1020;border:0;border-radius:11px;padding:12px 26px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit\">Пройти заново<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-for list=\"{{ q1.list }}\" as=\"Q\" hint-placeholder-count=\"10\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:18px 20px;margin:14px 0;box-shadow:0 10px 30px rgba(0,0,0,.28)\">\n      <div style=\"font-weight:700;font-size:15.5px;margin-bottom:12px;line-height:1.45\"><span style=\"color:#6f9bff;font-family:'JetBrains Mono',monospace;font-weight:700;margin-right:8px\">{{ Q.n }}<\u002Fspan>{{ Q.q }}<\u002Fdiv>\n      <sc-for list=\"{{ Q.options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">\n          <span style=\"{{ opt.dotStyle }}\">{{ opt.mark }}<\u002Fspan>\n          <span>{{ opt.text }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ Q.showExpl }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:11px;font-size:13.5px;color:#aeb6c8;padding:11px 14px;background:rgba(91,140,255,.08);border-radius:10px;line-height:1.55;border-left:2px solid #5b8cff\">{{ Q.expl }}<\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <sc-if value=\"{{ q1.notChecked }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"text-align:center;margin-top:18px\">\n      <sc-if value=\"{{ q1.warn }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:inline-block;font-size:13.5px;color:#ffc873;background:rgba(255,184,77,.1);border:1px solid rgba(255,184,77,.3);padding:8px 14px;border-radius:10px;margin-bottom:14px\">Ответь на все вопросы — осталось {{ q1.remaining }}<\u002Fdiv><br><\u002Fsc-if>\n      <button onclick=\"{{ q1.check }}\" style=\"background:linear-gradient(135deg,#3a6fff,#5b8cff);color:#fff;border:0;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 8px 26px rgba(91,140,255,.4)\" style-hover=\"filter:brightness(1.08)\">Проверить ответы<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv><\u002Fsection>\n\n<!-- ============ МОДУЛЬ 2 BAND ============ -->\n<section id=\"m2\" data-reveal=\"\" style=\"position:relative;padding:46px 0;background:linear-gradient(180deg,rgba(40,20,70,.5),rgba(10,15,30,.25));border-top:1px solid rgba(181,140,255,.2);border-bottom:1px solid rgba(181,140,255,.12)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#c2a0ff;font-weight:600\">Модуль 2<\u002Fdiv>\n  <h2 style=\"font-size:clamp(26px,3.6vw,36px);font-weight:800;letter-spacing:-.02em;margin:10px 0 10px\">Юнит-экономика: считаем прибыль с одной продажи<\u002Fh2>\n  <p style=\"color:#d8cce8;font-size:16px;margin:0;max-width:800px;line-height:1.6\">В Модуле 1 ты научился приводить покупателей — это объём. Продажи — ещё не деньги в кармане. Здесь учимся считать, сколько ты реально зарабатываешь с каждой продажи после всех расходов.<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<!-- A. База -->\n<section id=\"ue-base\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#b58cff,#8a6fff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(181,140,255,.45)\">A<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">База<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:780px\">Всё на одном простом примере. Логика одинаковая для Ozon, Wildberries и Яндекс.Маркета — отличаются только конкретные цифры комиссий и тарифов.<\u002Fp>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Главное: выручка ≠ прибыль<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Продал товаров на 100 000 ₽ — это <b style=\"color:#fff\">не значит<\u002Fb>, что заработал 100 000 ₽. Это <b style=\"color:#fff\">выручка<\u002Fb> — деньги, которые прошли через тебя. Из неё ещё уйдёт всё: закупка, комиссия, доставка, реклама, налог. То, что останется после <b style=\"color:#fff\">всех<\u002Fb> вычетов, — это <b style=\"color:#fff\">прибыль<\u002Fb>.<\u002Fp>\n  <div style=\"border-left:3px solid #5b8cff;background:rgba(91,140,255,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8cfde\"><b style=\"color:#fff\">Выручка<\u002Fb> — сколько тебе заплатили. <b style=\"color:#fff\">Прибыль<\u002Fb> — сколько осталось после всех расходов. Бизнес живёт на прибыли. Большой оборот при нулевой прибыли — это много работы за бесплатно.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Сквозной пример: куда уходят деньги с одной продажи<\u002Fh3>\n  <p style=\"font-size:13.5px;color:#8b93a8;margin:6px 0 14px;line-height:1.55\">Крем продаём за 1000 ₽. Доли расходов — близкие к реальным для маркетплейса. Комиссия сильно зависит от категории: где-то ~15%, в примере ~40%. «15% у всех» не бывает.<\u002Fp>\n\n  <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:10px 24px 18px;box-shadow:0 12px 36px rgba(0,0,0,.35);max-width:620px\">\n    <sc-for list=\"{{ waterfall }}\" as=\"r\" hint-placeholder-count=\"9\">\n      <div style=\"{{ r.rowStyle }}\">\n        <span style=\"{{ r.labelStyle }}\">{{ r.label }}<\u002Fspan>\n        <span style=\"{{ r.valStyle }}\">{{ r.val }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #57e08f;background:rgba(87,224,143,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#d6e3da\">Число «осталось до рекламы» (здесь <b style=\"color:#7ee0a8\">330 ₽<\u002Fb>) — самое важное. Из него ты платишь за рекламу, и что осталось — прибыль. Если реклама съедает больше 330 ₽ — продаёшь в минус. ↓ Покрути в калькуляторе ниже.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Что отъедает от цены<\u002Fh3>\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:8px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><sc-for list=\"{{ expenses }}\" as=\"r\" hint-placeholder-count=\"7\">\n        <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:200px\">Расход<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Простыми словами<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14px\">{{ r.term }}<\u002Fb><\u002Ftd>\n          <td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">{{ r.desc }}<\u002Ftd>\n        <\u002Ftr>\n      \n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Переменные и постоянные расходы<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(91,140,255,.08),rgba(255,255,255,.015));border:1px solid rgba(91,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#8fb0ff;font-size:15px\">Переменные<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Зависят от каждой штуки: себестоимость, комиссия, доставка, хранение. Продал больше — заплатил больше.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(181,140,255,.08),rgba(255,255,255,.015));border:1px solid rgba(181,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#c2a0ff;font-size:15px\">Постоянные<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Есть всегда, не зависят от продаж: зарплаты, сервисы, бухгалтерия, аренда.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #5b8cff;background:rgba(91,140,255,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8cfde\"><b style=\"color:#fff\">Прибыль = (маржа с единицы × число продаж) − постоянные расходы.<\u002Fb> Маржа с каждой штуки сначала покрывает постоянные расходы, и только сверх них — прибыль. Поэтому малый объём убыточен даже при хорошей марже.<\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- B. Нюансы -->\n<section id=\"ue-nuance\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#b58cff,#8a6fff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(181,140,255,.45)\">B<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Нюансы, которые экономят деньги<\u002Fh2>\n  <\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Процент выкупа бьёт по марже<\u002Fh3>\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:8px 0 28px;font-size:15px;line-height:1.6;color:#e8d9c0\">Из 100 заказов выкупили 70, а 30 поехали туда-обратно впустую. Доставку этих 30 ты оплатил, а заработал только с 70. Расходы на невыкупы ложатся на проданные штуки → <b style=\"color:#ffc873\">реальная маржа ниже расчётной<\u002Fb>. В категориях с большим возвратом (одежда, обувь) — решающий фактор.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;letter-spacing:-.01em\">Оборачиваемость: важна не только маржа, но и скорость<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#eef1f8;font-size:15px\">Товар А<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Маржа 32%, но оборот раз в 2 месяца → ≈16% на вложенное в месяц.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(87,224,143,.08),rgba(255,255,255,.015));border:1px solid rgba(87,224,143,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#7ee0a8;font-size:15px\">Товар Б<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Маржа всего 15%, но оборот 4 раза в месяц → 15% × 4 = <b style=\"color:#7ee0a8\">60%<\u002Fb> на вложенное в месяц.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #57e08f;background:rgba(87,224,143,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0 28px;font-size:15px;line-height:1.6;color:#d6e3da\">Прибыль делает не маржа сама по себе, а <b style=\"color:#7ee0a8\">маржа × скорость оборота<\u002Fb>. Маленькая маржа на быстром товаре часто выгоднее большой маржи на «висяке» (он ещё и копит расходы на хранение).<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Скидка роняет маржу сильнее, чем кажется<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Крем: цена 1000 ₽, маржа до рекламы 330 ₽. Дали скидку <b style=\"color:#fff\">20%<\u002Fb> (цена 800 ₽):<\u002Fp>\n  <ul style=\"margin:10px 0;color:#c4ccdb;font-size:15px;line-height:1.7;padding-left:22px\">\n    <li>Себестоимость, логистика, хранение <b style=\"color:#fff\">не уменьшились<\u002Fb> — 260 ₽ как было.<\u002Fli>\n    <li>Комиссия и эквайринг падают вместе с ценой (они % от цены): ≈328 ₽ вместо 410 ₽.<\u002Fli>\n    <li>Маржа = 800 − 260 − 328 = <b style=\"color:#fff\">212 ₽<\u002Fb>.<\u002Fli>\n  <\u002Ful>\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0 28px;font-size:15px;line-height:1.6;color:#e8d9c0\">Было 330 ₽ → стало 212 ₽. <b style=\"color:#ffc873\">Скидка 20% уронила маржу на 36%<\u002Fb> — почти вдвое больнее, чем размер скидки: часть затрат (товар, доставка) не уменьшается, режешь ты свою прибыль. Перед скидкой считай <b style=\"color:#ffc873\">новую маржу в рублях<\u002Fb>.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;letter-spacing:-.01em\">Две выручки: цена продавца и чек покупателя<\u002Fh3>\n  <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 22px;box-shadow:0 12px 36px rgba(0,0,0,.35)\">\n    <p style=\"font-size:14px;color:#bcc4d4;margin:0 0 10px;line-height:1.55\"><b style=\"color:#eef1f8\">Цена продавца<\u002Fb> — которую назначил ты. С неё ты получаешь деньги и от неё считается комиссия.<\u002Fp>\n    <p style=\"font-size:14px;color:#bcc4d4;margin:0 0 12px;line-height:1.55\"><b style=\"color:#eef1f8\">Чек покупателя<\u002Fb> — сколько он реально заплатил. Часто меньше: площадка добавляет свою скидку (СПП) за свой счёт, чтобы покупателю было выгоднее. Твою выручку эта скидка не режет.<\u002Fp>\n    <div style=\"border-left:3px solid #46e0d0;background:rgba(70,224,208,.07);padding:12px 14px;border-radius:0 10px 10px 0;font-size:13.5px;line-height:1.55;color:#c8cfde\">Считай маржу от <b style=\"color:#fff\">цены продавца<\u002Fb> — именно с неё ты получаешь деньги. Чек покупателя важен для спроса, но не для твоей маржи.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- C. Привычка -->\n<section id=\"ue-habit\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#46e0d0,#57e08f);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">C<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Главная привычка<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #57e08f;background:rgba(87,224,143,.08);padding:18px 22px;border-radius:0 14px 14px 0;margin:8px 0;font-size:16px;line-height:1.6;color:#d6e3da\"><b style=\"color:#7ee0a8\">Считай юнит-экономику ДО запуска товара.<\u002Fb> Распиши экономику одной продажи (как в примере выше) до того, как завести товар. Не сходится на бумаге — не сойдётся в реальности. Это фильтр: стоит ли продавать, какую ставить цену, сколько можно тратить на рекламу.<\u002Fdiv>\n  <p style=\"font-size:13.5px;color:#8b93a8;margin:14px 0 0;line-height:1.55\"><b style=\"color:#c4ccdb\">Про налог:<\u002Fb> с продаж платится налог — его тоже закладывай в расчёт. Конкретный режим и ставку подскажет бухгалтер. Менеджеру достаточно: прибыль считаем после налога, а не «грязными».<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Калькулятор юнит-экономики -->\n<section id=\"calc2\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-size:18px;font-weight:700;color:#0b1020;background:linear-gradient(135deg,#46e0d0,#5b8cff);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">★<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Калькулятор юнит-экономики<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:760px\">Введи свои цифры и смотри, сколько остаётся с одной продажи. Если уходит в минус — строка прибыли станет красной.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:26px;box-shadow:0 16px 44px rgba(0,0,0,.4)\">\n    <div>\n      <div style=\"margin:0 0 16px\"><label style=\"display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Цена продажи, ₽<\u002Flabel><input type=\"number\" value=\"{{ uPrice }}\" oninput=\"{{ setUPrice }}\"><\u002Fdiv>\n      <div style=\"margin:0 0 16px\"><label style=\"display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Себестоимость, ₽<\u002Flabel><input type=\"number\" value=\"{{ uCogs }}\" oninput=\"{{ setUCogs }}\"><\u002Fdiv>\n      <div style=\"margin:0 0 16px\"><label style=\"display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Комиссия площадки, %<\u002Flabel><input type=\"number\" value=\"{{ uComm }}\" oninput=\"{{ setUComm }}\"><\u002Fdiv>\n      <div style=\"margin:0 0 16px\"><label style=\"display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Логистика + эквайринг + хранение, ₽<\u002Flabel><input type=\"number\" value=\"{{ uOther }}\" oninput=\"{{ setUOther }}\"><\u002Fdiv>\n      <div style=\"margin:0\"><label style=\"display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cdd4e3\">Реклама на продажу, ₽<\u002Flabel><input type=\"number\" value=\"{{ uAds }}\" oninput=\"{{ setUAds }}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:15px\"><span style=\"color:#cdd4e3\">Цена продажи<\u002Fspan><span style=\"font-weight:700;font-family:'JetBrains Mono',monospace;color:#eef1f8\">{{ oPrice }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:15px\"><span style=\"color:#aeb6c8\">− Себестоимость<\u002Fspan><span style=\"font-weight:700;font-family:'JetBrains Mono',monospace;color:#ff9a9a\">{{ oCogs }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:15px\"><span style=\"color:#aeb6c8\">− Комиссия площадки<\u002Fspan><span style=\"font-weight:700;font-family:'JetBrains Mono',monospace;color:#ff9a9a\">{{ oComm }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:15px\"><span style=\"color:#aeb6c8\">− Логистика, эквайринг, хранение<\u002Fspan><span style=\"font-weight:700;font-family:'JetBrains Mono',monospace;color:#ff9a9a\">{{ oOther }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:2px solid rgba(255,255,255,.3);font-size:16px\"><span style=\"color:#eef1f8;font-weight:800\">= Маржа до рекламы<\u002Fspan><span style=\"font-weight:800;font-family:'JetBrains Mono',monospace;color:#eef1f8\">{{ oMargin }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:15px\"><span style=\"color:#aeb6c8\">− Реклама<\u002Fspan><span style=\"font-weight:700;font-family:'JetBrains Mono',monospace;color:#ff9a9a\">{{ oAds }}<\u002Fspan><\u002Fdiv>\n      <div style=\"{{ uFinalStyle }}\">\n        <div style=\"font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace\">{{ oProfit }}<\u002Fdiv>\n        <div style=\"font-size:13px;margin-top:4px;opacity:.92\">{{ oProfitPct }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- Тест Модуль 2 -->\n<section id=\"quiz2\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div id=\"quiz2-top\" style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-size:17px;font-weight:700;color:#06120b;background:linear-gradient(135deg,#57e08f,#46e0d0);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(87,224,143,.45)\">✓<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Тест по Модулю 2<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 18px;max-width:780px\">Здесь есть задачи на расчёт — посчитай в уме или на бумаге, потом проверь.<\u002Fp>\n\n  <sc-if value=\"{{ q2.scoreShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div id=\"quiz2-score\" style=\"{{ q2.scoreBoxStyle }}\">\n      <div style=\"font-size:46px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1\"><span>{{ q2.score }}<\u002Fspan> / {{ q2.total }}<\u002Fdiv>\n      <div style=\"font-size:19px;margin-top:8px;font-weight:700\">{{ q2.verdict }}<\u002Fdiv>\n      <div style=\"opacity:.92;margin-top:6px;font-size:14.5px\">{{ q2.scoreSub }}<\u002Fdiv>\n      <div style=\"height:9px;background:rgba(255,255,255,.25);border-radius:6px;overflow:hidden;margin:16px auto 0;max-width:420px\"><div style=\"height:100%;width:{{ q2.progWidth }};background:#fff;border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1)\"><\u002Fdiv><\u002Fdiv>\n      <button onclick=\"{{ q2.retake }}\" style=\"margin-top:18px;background:#fff;color:#0b1020;border:0;border-radius:11px;padding:12px 26px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit\">Пройти заново<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-for list=\"{{ q2.list }}\" as=\"Q\" hint-placeholder-count=\"5\">\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:18px 20px;margin:14px 0;box-shadow:0 10px 30px rgba(0,0,0,.28)\">\n      <div style=\"font-weight:700;font-size:15.5px;margin-bottom:12px;line-height:1.45\"><span style=\"color:#c2a0ff;font-family:'JetBrains Mono',monospace;font-weight:700;margin-right:8px\">{{ Q.n }}<\u002Fspan>{{ Q.q }}<\u002Fdiv>\n      <sc-for list=\"{{ Q.options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">\n          <span style=\"{{ opt.dotStyle }}\">{{ opt.mark }}<\u002Fspan>\n          <span>{{ opt.text }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ Q.showExpl }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:11px;font-size:13.5px;color:#aeb6c8;padding:11px 14px;background:rgba(181,140,255,.08);border-radius:10px;line-height:1.55;border-left:2px solid #b58cff\">{{ Q.expl }}<\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <sc-if value=\"{{ q2.notChecked }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"text-align:center;margin-top:18px\">\n      <sc-if value=\"{{ q2.warn }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:inline-block;font-size:13.5px;color:#ffc873;background:rgba(255,184,77,.1);border:1px solid rgba(255,184,77,.3);padding:8px 14px;border-radius:10px;margin-bottom:14px\">Ответь на все вопросы — осталось {{ q2.remaining }}<\u002Fdiv><br><\u002Fsc-if>\n      <button onclick=\"{{ q2.check }}\" style=\"background:linear-gradient(135deg,#8a6fff,#b58cff);color:#fff;border:0;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 8px 26px rgba(181,140,255,.4)\" style-hover=\"filter:brightness(1.08)\">Проверить ответы<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv><\u002Fsection>\n\n<!-- ============ МОДУЛЬ 3 BAND ============ -->\n<section id=\"m3\" data-reveal=\"\" style=\"position:relative;padding:46px 0;background:linear-gradient(180deg,rgba(10,46,54,.55),rgba(10,15,30,.25));border-top:1px solid rgba(70,224,208,.2);border-bottom:1px solid rgba(70,224,208,.12)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#5fd7c8;font-weight:600\">Модуль 3<\u002Fdiv>\n  <h2 style=\"font-size:clamp(26px,3.6vw,36px);font-weight:800;letter-spacing:-.02em;margin:10px 0 10px\">Операционка: путь товара и продвижение<\u002Fh2>\n  <p style=\"color:#cfe6e3;font-size:16px;margin:0;max-width:800px;line-height:1.6\">Модули 1–2 — это модели трафика и денег. Здесь — «бэкенд»: как товар физически доезжает до покупателя и по каким правилам площадка решает, кому показать твою карточку. Без этого первые два модуля висят в воздухе.<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<!-- A. Путь товара -->\n<section id=\"m3-path\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#06120b;background:linear-gradient(135deg,#46e0d0,#2bb6c4);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">A<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Путь товара до покупателя<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:780px\">Логика общая для Ozon, WB и Яндекс.Маркета, но детали логистики у площадок разные — разберём на конкретике Ozon и WB.<\u002Fp>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Цепочка поставки: от фабрики до склада маркетплейса<\u002Fh3>\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:8px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:42px\">#<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Шаг<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:12px 14px;border-t
