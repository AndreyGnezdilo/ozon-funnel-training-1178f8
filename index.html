op:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">1<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#c4ccdb;font-size:14px;line-height:1.55\"><b style=\"color:#fff\">Фабрика производит<\u002Fb> товар и доставляет его нам на склад в Москве.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">2<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#c4ccdb;font-size:14px;line-height:1.55\"><b style=\"color:#fff\">Фулфилмент<\u002Fb> (склад в Москве) принимает товар и готовит к отгрузке: проверка, упаковка и маркировка <b style=\"color:#fff\">под требования конкретного маркетплейса<\u002Fb>.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">3<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#c4ccdb;font-size:14px;line-height:1.55\">Мы даём фулфилменту <b style=\"color:#fff\">ТЗ на отгрузку<\u002Fb> — что, сколько и на какой маркетплейс.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">4<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#c4ccdb;font-size:14px;line-height:1.55\">Фулфилмент <b style=\"color:#fff\">своими силами везёт товар на маркетплейс<\u002Fb>.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#e8d9c0\"><b style=\"color:#ffc873\">«Отгрузка на маркетплейс» — это не «привёз и всё».<\u002Fb> Это отдельная операция со своими правилами приёмки. Ошибся в маркировке или упаковке — приёмку завернут, товар застрянет, продажи встанут.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Две схемы работы со складом: FBO и FBS<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(70,224,208,.08),rgba(255,255,255,.015));border:1px solid rgba(70,224,208,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#5fd7c8;font-size:15px;font-family:'JetBrains Mono',monospace\">FBO<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Отдаёшь товар на склад маркетплейса. Он хранит, собирает заказ и везёт покупателю. Платишь площадке за хранение и логистику.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#eef1f8;font-size:15px;font-family:'JetBrains Mono',monospace\">FBS<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Товар лежит на твоём складе. Площадка только довозит его покупателю при заказе. Хранение и сборку делаешь сам.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #46e0d0;background:rgba(70,224,208,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8e0dd\">Схема меняет расходы из Модуля 2: на FBO в юнитку входит хранение на складе площадки, на FBS — своё хранение и сборка. <b style=\"color:#fff\">Мы работаем только по схеме FBO<\u002Fb> — товар на складах маркетплейса.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Логистика Ozon и Wildberries устроена по-разному<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(91,140,255,.07),rgba(255,255,255,.015));border:1px solid rgba(91,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#8fb0ff;font-size:15px\">Ozon — ставка на количество складов<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:10px 0;line-height:1.55\">Построить как можно больше складов, чтобы меньше возить между ними. Много <b style=\"color:#eef1f8\">кластеров<\u002Fb> и развитый <b style=\"color:#eef1f8\">кроссдокинг<\u002Fb>: сдаёшь товар на сортировочный центр, дальше Ozon сам растаскивает его по складам ближе к покупателям.<\u002Fp>\n      <p style=\"font-size:13px;color:#ff9a9a;margin:8px 0 0;line-height:1.5\">Плата за это: сложная логистика — чтобы быть доступным везде, нужно покрывать много складов и держать запас на каждом.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(181,140,255,.07),rgba(255,255,255,.015));border:1px solid rgba(181,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#c2a0ff;font-size:15px\">Wildberries — ставка на перемещение <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;background:rgba(255,159,67,.18);color:#ffb066;vertical-align:middle\">WB<\u002Fspan><\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:10px 0;line-height:1.55\">Не плодить склады, а эффективно гонять товар между ними. Много мелких СЦ + крупные хабы; страна поделена на <b style=\"color:#eef1f8\">макрорегионы<\u002Fb> (≈4). Грузишь основные склады — дальше WB за свой счёт развозит по СЦ и пунктам выдачи.<\u002Fp>\n      <p style=\"font-size:13px;color:#7ee0a8;margin:8px 0 0;line-height:1.5\">Для продавца проще по покрытию.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #46e0d0;background:rgba(70,224,208,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8e0dd\"><b style=\"color:#fff\">Вывод для менеджера.<\u002Fb> Где держать запас — вытекает из этой разницы. На Ozon близкий к покупателю склад не только экономит логистику, но и <b style=\"color:#fff\">поднимает позицию в выдаче<\u002Fb> (быстрая доставка — фактор ранжирования, см. часть C). Это связывает остатки и оборачиваемость из Модуля 2 с продажами.<\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- B. Продвижение -->\n<section id=\"m3-promo\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#06120b;background:linear-gradient(135deg,#46e0d0,#2bb6c4);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">B<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Как площадка решает, кому показать товар<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:780px\">Товар на складе — но его ещё надо показать. Три рычага: SEO, цена и акции, внутренняя реклама. Плюс отдельный канал — рекомендации.<\u002Fp>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">SEO — чтобы тебя находили по запросам<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\"><b style=\"color:#fff\">SEO<\u002Fb> (Search Engine Optimization) — наполнение карточки характеристиками, описанием и ключевыми словами так, чтобы покупатель находил её по нужным запросам, разделам каталога и фильтрам.<\u002Fp>\n  <div style=\"border-left:3px solid #5b8cff;background:rgba(91,140,255,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8cfde\">Площадка ищет совпадение <b style=\"color:#fff\">слов из запроса<\u002Fb> со словами в карточке. Нет совпадения — товар не попадёт в выдачу по этому запросу (подробнее — часть C). Грамотная карточка — не «для красоты», а <b style=\"color:#fff\">условие, чтобы тебя вообще показали<\u002Fb>.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Рекомендации — отдельный канал, и у площадок он разный<\u002Fh3>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px\">\n    <div style=\"background:linear-gradient(180deg,rgba(91,140,255,.07),rgba(255,255,255,.015));border:1px solid rgba(91,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#8fb0ff;font-size:15px\">Ozon — персонализация под покупателя<\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Ozon ведёт историю каждого пользователя и показывает персональную выдачу и рекомендации — по поведению покупателя, а не жёстко по категории товара. Охват шире.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:linear-gradient(180deg,rgba(181,140,255,.07),rgba(255,255,255,.015));border:1px solid rgba(181,140,255,.22);border-radius:18px;padding:20px 22px\">\n      <b style=\"color:#c2a0ff;font-size:15px\">Wildberries — привязка к категории <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;background:rgba(255,159,67,.18);color:#ffb066;vertical-align:middle\">WB<\u002Fspan><\u002Fb>\n      <p style=\"font-size:14px;color:#bcc4d4;margin:8px 0 0;line-height:1.55\">Рекомендации привязаны к категории/формату. В нише «для роста волос» сыворотку порекомендуют только среди сывороток; лосьон или тоник с тем же составом туда не попадут. Охват уже — здесь WB слабее Ozon.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Цена и акции<\u002Fh3>\n  <div style=\"background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:20px 22px;box-shadow:0 12px 36px rgba(0,0,0,.35)\">\n    <p style=\"font-size:14px;color:#cdd4e3;margin:0 0 10px;line-height:1.55\"><b style=\"color:#8fb0ff\">Ozon — круглогодичные глобальные акции<\u002Fb>, сменяют друг друга почти без перерыва. Грубо три типа:<\u002Fp>\n    <p style=\"font-size:13.5px;color:#aeb6c8;margin:8px 0;line-height:1.55\">• <b style=\"color:#eef1f8\">Эластичный бустинг<\u002Fb> — у акции есть ценовой коридор (мин/макс). Цену внутри коридора ставишь <b style=\"color:#eef1f8\">ты сам<\u002Fb> (через API или кабинет), и за участие получаешь буст. Ozon её сам не крутит — держится, пока не поменяешь.<\u002Fp>\n    <p style=\"font-size:13.5px;color:#aeb6c8;margin:8px 0;line-height:1.55\">• <b style=\"color:#eef1f8\">Акции с фиксированной ценой<\u002Fb> — цена фиксированная и обычно ниже порога эластичного бустинга, за это свой коэффициент буста.<\u002Fp>\n    <p style=\"font-size:13.5px;color:#aeb6c8;margin:8px 0 0;line-height:1.55\"><b style=\"color:#c2a0ff\">Wildberries<\u002Fb> <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;background:rgba(255,159,67,.18);color:#ffb066;vertical-align:middle\">WB<\u002Fspan> — каждую неделю своя акция, тоже с обещанием буста.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"border-left:3px solid #ffb84d;background:rgba(255,184,77,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#e8d9c0\"><b style=\"color:#ffc873\">Текущая реальность:<\u002Fb> влияние акционного буста на ранжирование снижается — и на Ozon, и на WB. Поэтому заходим в акцию <b style=\"color:#fff\">только когда её цена совпадает с целевой регулярной<\u002Fb> — то есть когда это не режет маржу. Лезть в акцию ради призрачного буста, теряя в цене, — путь в минус (нелинейность скидки из Модуля 2).<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Внутренняя реклама<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Реклама делится на <b style=\"color:#fff\">поиск<\u002Fb> и <b style=\"color:#fff\">рекомендации<\u002Fb> — как типы трафика из Модуля 1: поиск дорогой, но конверсионный (покупатель уже ищет), рекомендации дешевле и охватнее.<\u002Fp>\n  <p style=\"font-size:13.5px;color:#9aa3b8;margin:10px 0;line-height:1.55\">Инструменты Ozon — <b style=\"color:#c4ccdb\">оплата за клик<\u002Fb> и <b style=\"color:#c4ccdb\">оплата за заказ<\u002Fb>. Ставками управляешь вручную (целевая цена клика, «вывод в топ») или отдаёшь на автостратегию. Включишь оба инструмента сразу — товар получает преимущество (обе ставки идут в общую оценку выдачи).<\u002Fp>\n  <div style=\"border-left:3px solid #57e08f;background:rgba(87,224,143,.08);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#d6e3da\"><b style=\"color:#7ee0a8\">Метрика эффективности — ДРР<\u002Fb> (доля рекламных расходов от цены продавца). Наш ориентир — <b style=\"color:#fff\">ниже 10%<\u002Fb>, целевой по Ozon ~8%, обычно ниже. На WB удержать низкий ДРР сложнее. (Это наши цели, не универсальный стандарт — порог считается от маржи, см. Модуль 2.)<\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- C. Ранжирование -->\n<section id=\"m3-rank\" data-reveal=\"\" style=\"position:relative;padding:54px 0;border-bottom:1px solid rgba(255,255,255,.06)\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px\">\n  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:10px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#06120b;background:linear-gradient(135deg,#46e0d0,#2bb6c4);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:11px;box-shadow:0 0 20px rgba(70,224,208,.45)\">C<\u002Fspan>\n    <h2 style=\"font-size:clamp(25px,3.4vw,33px);font-weight:800;letter-spacing:-.018em;margin:0\">Как работает ранжирование (на примере Ozon)<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"color:#9aa3b8;font-size:16px;margin:0 0 22px;max-width:780px\">Самое важное в модуле: по какой логике площадка выстраивает порядок товаров в выдаче.<\u002Fp>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em\">Главный принцип: площадка зарабатывает на тебе<\u002Fh3>\n  <p style=\"margin:10px 0;color:#c4ccdb;font-size:15.5px\">Маркетплейс зарабатывает на продавцах, и главная цель его поиска — <b style=\"color:#fff\">не клик, а заказ<\u002Fb>. Поэтому выдачу он строит, балансируя два своих интереса: <b style=\"color:#fff\">чтобы покупатель купил<\u002Fb> (релевантный, недорогой товар, быстрая доставка, хорошие отзывы) и <b style=\"color:#fff\">чтобы заработать больше<\u002Fb> (выше тот, кто платит за продвижение).<\u002Fp>\n  <div style=\"border-left:3px solid #46e0d0;background:rgba(70,224,208,.07);padding:16px 20px;border-radius:0 14px 14px 0;margin:18px 0;font-size:15px;line-height:1.6;color:#c8e0dd\">Грубо: <b style=\"color:#fff\">итоговая позиция ≈ органика (насколько товар хорош и подходит запросу) + платное продвижение (сколько вложил в рекламу).<\u002Fb> Нельзя купить топ деньгами при плохом товаре (слабые отзывы и продажи тянут органику вниз), и нельзя взять топ хорошим товаром без продвижения.<\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 12px;letter-spacing:-.01em\">Как Ozon строит выдачу — по слоям<\u002Fh3>\n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin:8px 0;background:rgba(255,255,255,.018)\"><div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;font-size:14px\">\n    <thead><tr>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:42px\">#<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1);width:200px\">Слой<\u002Fth>\n      <th style=\"padding:12px 14px;text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b93a8;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.1)\">Что происходит<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">1<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14px\">Отбор по словам<\u002Fb><\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">Ищет слова запроса в названии, категории, бренде, описании, характеристиках (в названии магазина и отзывах — нет). Нет совпадения — товара в выдаче нет. <i style=\"color:#8b93a8\">(Вот зачем SEO.)<\u002Fi><\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">2<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14px\">Оценка вероятности покупки<\u002Fb><\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">ML-модель ставит оценку — насколько вероятно, что товар купят по этому запросу. Факторы с <b style=\"color:#c4ccdb\">разным весом<\u002Fb>: текстовая релевантность, продажи, популярность, цена, скорость доставки, отзывы, персонализация. Вес плавает: широкий запрос → важнее цена, узкий → отзывы, дальний регион → доставка.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">3<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14px\">Бустинги<\u002Fb><\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">Повышающие коэффициенты — за участие в акциях и за выгодный <b style=\"color:#c4ccdb\">индекс цен<\u002Fb> (насколько ты дешевле рынка и других площадок).<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#5fd7c8;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;vertical-align:top\">4<\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);vertical-align:top\"><b style=\"color:#eef1f8;font-weight:700;font-size:14px\">Платное продвижение<\u002Fb><\u002Ftd><td style=\"padding:12px 14px;border-top:1px solid rgba(255,255,255,.055);color:#aeb6c8;font-size:14px;line-height:1.5;vertical-align:top\">Поверх органики прибавляется вклад рекламы: выше ставка и вероятность клика/заказа — больше прибавка к позиции.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable><\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-size:19px;font-weight:700;margin:32px 0 10px;letter-spacing:-.01em\">Что запомнить менеджеру<\u002Fh3>\n  <ul style=\"margin:10px 0;color:#c4ccdb;font-size:15px;line-height:1.7;padding-left:22px\">\n    <li><b style=\"color:#fff\">Цель алгоритма — заказ, а не показы и клики.<\u002Fb> Накрутка просмотров без покупок <b style=\"color:#ff9a9a\">вредит<\u002Fb>: поведенческие портятся, карточка падает. Поднимают позицию реальные продажи и продвижение.<\u002Fli>\n    <li><b style=\"color:#fff\">Топ-позиции решают всё.<\u002Fb> Конверсия в заказ резко падает после ~25 места и почти обнуляется к сотому. Быть на 80-й позиции — почти то же, что не быть в выдаче.<\u002Fli>\n    <li><b style=\"color:#fff\">Факторы имеют разный вес.<\u002Fb> Продажи и релевантность весят больше отзывов — качай «тяжёлое».<\u002Fli>\n    <li><b style=\"color:#fff\">Позиция пересчитывается постоянно<\u002Fb> — под каждый запрос, регион и покупателя, и зависит от конкурентов. Улучшил карточку, а просел — конкурент тоже подвинулся. Это норма.<\u002Fli>\n    <li><b style=\"color:#fff\">На что влияешь напрямую:<\u002Fb> текст карточки, цена, скорость доставки (где держишь запас — часть A), сбор отзывов, акции, реклама.<\u002Fli>\n  <\u002Ful>\n\n  <div style=\"background:linear-gradient(135deg,rgba(70,224,208,.12),rgba(91,140,255,.07));border:1px solid rgba(70,224,208,.24);border-radius:20px;padding:24px 26px;margin:24px 0 0;box-shadow:0 16px 44px rgba(0,0,0,.35)\">\n    <h3 style=\"font-size:20px;font-weight:800;margin:0 0 14px;letter-spacing:-.01em;color:#eef1f8\">Итог модуля 3<\u002Fh3>\n    <ol style=\"margin:0;padding-left:20px;color:#c4ccdb;font-size:14px;line-height:1.65;display:flex;flex-direction:column;gap:8px\">\n      <li><b style=\"color:#fff\">Путь товара:<\u002Fb> фабрика → фулфилмент в Москве → отгрузка на маркетплейс. Ошибка в упаковке/маркировке = застрявшая приёмка.<\u002Fli>\n      <li><b style=\"color:#fff\">FBO vs FBS:<\u002Fb> склад площадки или свой — это меняет расходы из Модуля 2. Мы — только FBO.<\u002Fli>\n      <li><b style=\"color:#fff\">Логистика:<\u002Fb> Ozon — много складов + кроссдокинг (сложнее покрытие), WB — макрорегионы (проще). Где держать запас — вытекает отсюда.<\u002Fli>\n      <li><b style=\"color:#fff\">SEO<\u002Fb> — условие, чтобы тебя вообще нашли по запросу.<\u002Fli>\n      <li><b style=\"color:#fff\">Рекомендации:<\u002Fb> Ozon — персонально под покупателя (шире), WB — по категории (уже).<\u002Fli>\n      <li><b style=\"color:#fff\">Акции:<\u002Fb> буст слабеет; заходим только когда акционная цена = целевой.<\u002Fli>\n      <li><b style=\"color:#fff\">Реклама:<\u002Fb> поиск (дорогой, конверсионный) vs рекомендации (дешёвый, охватный); метрика — ДРР, ориентир &lt;10%.<\u002Fli>\n      <li><b style=\"color:#fff\">Ранжирование = баланс «вероятность покупки» и «вклад рекламы».<\u002Fb> Итог ≈ органика + продвижение.<\u002Fli>\n      <li><b style=\"color:#fff\">Выдача по слоям:<\u002Fb> отбор по словам → оценка вероятности покупки → бустинги → платное продвижение. Накрутка показов карточку роняет.<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<footer style=\"padding:34px 0 64px;color:#6b7384;font-size:13px;text-align:center\"><div style=\"max-width:1060px;margin:0 auto;padding:0 22px;line-height:1.7\">\n  Обучение менеджера маркетплейса · Модуль 1 (воронка) + Модуль 2 (юнит-экономика) + Модуль 3 (операционка)\n<\u002Fdiv><\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    imp: 100000, ctr: 3, cr1: 20, cr2: 40, buy: 70,\n    uPrice: 1000, uCogs: 150, uComm: 40, uOther: 120, uAds: 120,\n    acc: [false, false, false, false, false],\n    a1: new Array(10).fill(null), checked1: false, warn1: false,\n    a2: new Array(5).fill(null), checked2: false, warn2: false\n  };\n\n  funnelStages = [\n    { n: '1', name: 'Показы', desc: 'Сколько раз товар попался людям на глаза (выдача / рекомендации / реклама).' },\n    { n: '2', name: 'Клики', desc: 'Сколько раз кликнули и открыли карточку — целевое взаимодействие, а не «промелькнуло».' },\n    { n: '3', name: 'В корзину', desc: 'Сколько раз добавили в корзину. Сигнал серьёзного интереса.' },\n    { n: '4', name: 'Заказ', desc: 'Сколько раз реально оформили заказ.' },\n    { n: '5', name: 'Выкуп', desc: 'Сколько заказов забрали и оставили себе (не отменили, не вернули).' }\n  ];\n  conversions = [\n    { trans: 'Показ → Клик', metric: 'CTR', formula: 'Клики / Показы', means: 'Кликабельность: фото, цена, рейтинг в плитке' },\n    { trans: 'Клик → Корзина', metric: 'CR в корзину', formula: 'Корзина / Клики', means: 'Насколько карточка убеждает' },\n    { trans: 'Корзина → Заказ', metric: 'CR в заказ', formula: 'Заказы / Корзина', means: 'Решился ли оформить' },\n    { trans: 'Заказ → Выкуп', metric: '% выкупа', formula: 'Выкупы / Заказы', means: 'Дошёл ли до денег' }\n  ];\n  offlineMap = [\n    { ecom: 'Показы', tent: 'Прохожие мимо витрины' },\n    { ecom: 'Клик', tent: 'Зашёл в магазин' },\n    { ecom: 'В корзину', tent: 'Взял товар с полки / меряет' },\n    { ecom: 'Заказ', tent: 'Пошёл на кассу' },\n    { ecom: 'Выкуп', tent: 'Оплатил и забрал' }\n  ];\n  economics = [\n    { metric: 'CPM', full: 'Cost Per Mille — за 1000 показов', sense: 'Сколько стоит «показаться»' },\n    { metric: 'CPC', full: 'Cost Per Click — за клик', sense: 'Сколько стоит привести на карточку' },\n    { metric: 'CPO', full: 'Cost Per Order — за заказ', sense: 'Сколько рекламы ушло на один заказ' },\n    { metric: 'ДРР', full: 'Доля рекламных расходов = реклама / выручка', sense: 'Какая часть выручки съедается рекламой' },\n    { metric: 'Маржа', full: 'Прибыль с продажи после всех расходов', sense: 'Остаётся ли что-то после трафика, комиссии, логистики' }\n  ];\n\n  leversData = [\n    { n: '1', intro: 'Вход в воронку: алгоритм ранжирования. Выше карточка → больше показов.', note: '', rows: [\n      { term: 'Название', desc: 'Содержит ключевые запросы — по нему алгоритм понимает, где показывать' },\n      { term: 'Точность описания', desc: 'Не соответствует товару → карточку считают «мусорной» и понижают' },\n      { term: 'Характеристики', desc: 'Полнее и точнее → больше релевантных запросов → выше ранг' },\n      { term: 'Конверсии', desc: 'Хорошо конвертишь → больше показов. Петля обратной связи' },\n      { term: 'Остатки', desc: 'Мало остатков → меньше показов' },\n      { term: 'Региональные остатки', desc: 'Скорость доставки в регион → приоритет в выдаче для него' },\n      { term: 'Акции', desc: 'Участие повышает приоритет — площадка двигает участников' },\n      { term: 'Выручка', desc: 'Оборот карточки — сигнал алгоритму' },\n      { term: 'Внутренняя реклама', desc: 'Платный трафик добавляет показы поверх органики' },\n      { term: 'Поднятие/спуск цены', desc: 'Динамика влияет на ранжирование' },\n      { term: 'Внешний трафик', desc: 'Даёт объём заказов, но конвертит хуже (холоднее)' },\n      { term: 'Скорость отзывов', desc: 'Быстрее набираются → быстрее соц. доказательство → конверсия → показы' }\n    ]},\n    { n: '2', intro: 'Решает то, что видно в плитке выдачи, до открытия карточки.', note: '', rows: [\n      { term: 'Главное фото', desc: 'Самый сильный рычаг. Особенно «огненная» боль или топ-УТП прямо в плитке' },\n      { term: 'Кол-во отзывов', desc: 'Соц. доказательство ещё до клика' },\n      { term: 'Рейтинг', desc: 'Звёзды видны в выдаче; низкий режет CTR' },\n      { term: 'Цена', desc: 'Относительно конкурентов в плитке' },\n      { term: 'Позиция', desc: 'Верх забирает львиную долю кликов' },\n      { term: 'Сроки доставки', desc: 'Быстрее → выше CTR' },\n      { term: 'Известность бренда', desc: 'Узнаваемый кликают охотнее' },\n      { term: 'Плашка в акции', desc: 'Бейдж скидки привлекает внимание' }\n    ]},\n    { n: '3', intro: 'После клика решает содержимое карточки и доверие к продавцу.', note: 'Допродажи: склейка · рекомендации (в фото / отзывах / на площадке) · вкладыш со списком · ТГ-бот · единая стилистика бренда.',  (e) => this.setState({ uCogs: e.target.value === '' ? 0 : +e.target.value });\n  setUComm = (e) => this.setState({ uComm: e.target.value === '' ? 0 : +e.target.value });\n  setUOther = (e) => this.setState({ uOther: e.target.value === '' ? 0 : +e.target.value });\n  setUAds = (e) => this.setState({ uAds: e.target.value === '' ? 0 : +e.target.value });\n\n  toggleAcc(i) {\n    const a = this.state.acc.slice();\n    a[i] = !a[i];\n    this.setState({ acc: a });\n  }\n\n  selAns(quiz, i, j) {\n    const checkedKey = quiz === 1 ? 'checked1' : 'checked2';\n    if (this.state[checkedKey]) return;\n    const key = quiz === 1 ? 'a1' : 'a2';\n    const arr = this.state[key].slice();\n    arr[i] = j;\n    this.setState({ [key]: arr, [quiz === 1 ? 'warn1' : 'warn2']: false });\n  }\n\n  checkQuiz(quiz) {\n    const key = quiz === 1 ? 'a1' : 'a2';\n    const rem = this.state[key].filter((a) => a === null).length;\n    if (rem > 0) { this.setState({ [quiz === 1 ? 'warn1' : 'warn2']: true }); return; }\n    this.setState({ [quiz === 1 ? 'checked1' : 'checked2']: true, [quiz === 1 ? 'warn1' : 'warn2']: false }, () => {\n      const el = document.getElementById('quiz' + quiz + '-score');\n      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 90, behavior: 'smooth' });\n    });\n  }\n\n  retakeQuiz(quiz) {\n    const n = quiz === 1 ? 10 : 5;\n    this.setState({ [quiz === 1 ? 'a1' : 'a2']: new Array(n).fill(null), [quiz === 1 ? 'checked1' : 'checked2']: false, [quiz === 1 ? 'warn1' : 'warn2']: false }, () => {\n      const el = document.getElementById('quiz' + quiz + '-top');\n      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 80, behavior: 'smooth' });\n    });\n  }\n\n  componentDidMount() {\n    this._io = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.04, rootMargin: '0px 0px -40px 0px' });\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1)';\n      this._io.observe(el);\n    });\n  }\n  componentWillUnmount() { if (this._io) this._io.disconnect(); }\n\n  buildQuiz(quiz) {\n    const data = quiz === 1 ? this.quizData1 : this.quizData2;\n    const answers = quiz === 1 ? this.state.a1 : this.state.a2;\n    const checked = quiz === 1 ? this.state.checked1 : this.state.checked2;\n    const warn = quiz === 1 ? this.state.warn1 : this.state.warn2;\n    const numColor = quiz === 1 ? '#6f9bff' : '#c2a0ff';\n    const accentSel = quiz === 1 ? '#5b8cff' : '#b58cff';\n    const selBg = quiz === 1 ? 'rgba(91,140,255,.12)' : 'rgba(181,140,255,.12)';\n\n    const stateStyles = {\n      idle: { bc: 'rgba(255,255,255,.14)', bg: 'rgba(255,255,255,.025)', col: '#c4ccdb', db: 'rgba(255,255,255,.22)', dbg: 'transparent', dc: 'transparent', cur: 'pointer' },\n      sel: { bc: accentSel, bg: selBg, col: '#eef1f8', db: accentSel, dbg: accentSel, dc: '#0b1020', cur: 'pointer' },\n      correct: { bc: '#57e08f', bg: 'rgba(87,224,143,.12)', col: '#eef1f8', db: '#57e08f', dbg: '#57e08f', dc: '#06120b', cur: 'default' },\n      wrong: { bc: '#ff7a7a', bg: 'rgba(255,122,122,.12)', col: '#eef1f8', db: '#ff7a7a', dbg: '#ff7a7a', dc: '#1a0606', cur: 'default' },\n      dim: { bc: 'rgba(255,255,255,.07)', bg: 'transparent', col: '#6b7384', db: 'rgba(255,255,255,.12)', dbg: 'transparent', dc: 'transparent', cur: 'default' }\n    };\n    const list = data.map((Q, i) => {\n      const chosen = answers[i];\n      return {\n        n: (i + 1) + '.', q: Q.q, expl: Q.e, showExpl: checked,\n        options: Q.o.map((opt, j) => {\n          let st;\n          if (checked) st = (j === Q.a) ? 'correct' : (j === chosen ? 'wrong' : 'dim');\n          else st = (chosen === j) ? 'sel' : 'idle';\n          const s = stateStyles[st];\n          return {\n            text: opt,\n            mark: st === 'correct' ? '✓' : st === 'wrong' ? '✕' : '',\n            onClick: () => this.selAns(quiz, i, j),\n            style: {\n              display: 'flex', alignItems: 'center', gap: '11px', padding: '12px 14px',\n              borderRadius: '11px', margin: '8px 0', cursor: s.cur, fontSize: '14.5px',\n              lineHeight: 1.4, border: '1.5px solid ' + s.bc, background: s.bg, color: s.col,\n              transition: 'border-color .15s, background .15s', userSelect: 'none'\n            },\n            dotStyle: {\n              width: '20px', height: '20px', borderRadius: '50%', flex: 'none', display: 'flex',\n              alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: 800,\n              border: '2px solid ' + s.db, background: s.dbg, color: s.dc\n            }\n          };\n        })\n      };\n    });\n\n    const total = data.length;\n    const score = checked ? answers.reduce((s, a, i) => s + (a === data[i].a ? 1 : 0), 0) : 0;\n    const pct = Math.round(score / total * 100);\n    let verdict, scoreSub, grad;\n    if (pct >= 90) { verdict = 'Отлично!'; scoreSub = 'Материал усвоен.'; grad = 'linear-gradient(135deg,#1f9d57,#46e08a)'; }\n    else if (pct >= 70) { verdict = 'Хорошо'; scoreSub = 'База есть. Пробегись по ошибкам ниже.'; grad = 'linear-gradient(135deg,#2f5fe0,#5b8cff)'; }\n    else if (pct >= 50) { verdict = 'Нужно повторить'; scoreSub = 'Половина усвоена. Перечитай разбор и пройди заново.'; grad = 'linear-gradient(135deg,#c98a1a,#ffb84d)'; }\n    else { verdict = 'Стоит вернуться к материалу'; scoreSub = 'Перечитай модуль и пройди тест ещё раз.'; grad = 'linear-gradient(135deg,#c0392b,#ff7a7a)'; }\n\n    return {\n      list, total, score, verdict, scoreSub, progWidth: pct + '%',\n      scoreShow: checked, notChecked: !checked, warn,\n      remaining: answers.filter((a) => a === null).length,\n      scoreBoxStyle: {\n        background: grad, padding: '30px 26px', borderRadius: '20px', textAlign: 'center',\n        color: '#fff', margin: '8px 0 22px', animation: 'popIn .5s cubic-bezier(.2,.8,.2,1)',\n        boxShadow: '0 20px 50px rgba(0,0,0,.4)'\n      },\n      check: () => this.checkQuiz(quiz), retake: () => this.retakeQuiz(quiz)\n    };\n  }\n\n  renderVals() {\n    const { imp, ctr, cr1, cr2, buy, uPrice, uCogs, uComm, uOther, uAds, acc } = this.state;\n    const fmt = (n) => Math.round(n).toLocaleString('ru-RU');\n    const rub = (n) => fmt(Math.abs(n)) + ' ₽';\n\n    // funnel\n    const click = imp * ctr / 100, cart = click * cr1 / 100, ord = cart * cr2 / 100, bu = ord * buy / 100;\n    const lg = (v) => Math.log10(Math.max(1, v));\n    const maxL = lg(imp) || 1;\n    const wf = (v) => (14 + 86 * (lg(v) / maxL)).toFixed(1) + '%';\n    const min = Math.min(ctr > 10 ? Infinity : ctr, cr1, cr2, buy);\n    const convStyle = (weak) => ({ fontSize: '12.5px', fontWeight: 600, margin: '3px 0 8px 2px', display: 'flex', alignItems: 'center', gap: '7px', color: weak ? '#ff8585' : '#8b93a8' });\n    const conv = (v, weak) => ({ pct: v + '%', weak, style: convStyle(weak) });\n\n    // accordions\n    const bodyStyle = (open) => ({ overflow: 'hidden', transition: 'max-height .45s cubic-bezier(.4,0,.2,1), opacity .35s ease', maxHeight: open ? '2400px' : '0px', opacity: open ? 1 : 0 });\n    const chevStyle = (open) => ({ transition: 'transform .35s ease', color: '#6f9bff', fontSize: '16px', transform: open ? 'rotate(180deg)' : 'rotate(0deg)' });\n    const levers = this.leversData.map((L, i) => ({\n      n: L.n, title: this.leverTitles[i], intro: L.intro, note: L.note, rows: L.rows,\n      toggle: () => this.toggleAcc(i), body: bodyStyle(acc[i]), chev: chevStyle(acc[i]),\n      numStyle: { fontFamily: \"'JetBrains Mono',monospace\", width: '28px', height: '28px', lineHeight: '28px', textAlign: 'center', borderRadius: '8px', background: this.leverColors[i], color: this.leverInk[i], fontSize: '13px', fontWeight: 700, flex: 'none' }\n    }));\n\n    // unit economics waterfall (static example, 1000/150/40/120/120)\n    const exPrice = 1000, exCogs = 150, exComm = 400, exAcq = 10, exLog = 90, exStore = 20, exMargin = 330, exAds = 120, exProfit = 210;\n    const wfLine = (label, val, kind) => {\n      const isTotal = kind === 'total', isFinal = kind === 'final', isMinus = kind === 'minus';\n      return {\n        label, val,\n        rowStyle: {\n          display: 'flex', justifyContent: 'space-between', alignItems: 'center',\n          padding: isTotal || isFinal ? '12px 0' : '8px 0',\n          borderBottom: isFinal ? 'none' : (isTotal ? '2px solid rgba(255,255,255,.3)' : '1px dashed rgba(255,255,255,.1)'),\n          fontSize: isTotal || isFinal ? '16px' : '15px'\n        },\n        labelStyle: { color: isTotal || isFinal ? '#eef1f8' : (isMinus ? '#aeb6c8' : '#cdd4e3'), fontWeight: isTotal || isFinal ? 800 : 500 },\n        valStyle: { fontFamily: \"'JetBrains Mono',monospace\", fontWeight: isTotal || isFinal ? 800 : 700, color: isFinal ? '#7ee0a8' : (isMinus ? '#ff9a9a' : '#eef1f8') }\n      };\n    };\n    const waterfall = [\n      wfLine('Цена, за которую продали', rub(exPrice), 'plus'),\n      wfLine('− Себестоимость (закупка + упаковка + доставка до склада)', '−' + rub(exCogs), 'minus'),\n      wfLine('− Комиссия площадки (≈40%)', '−' + rub(exComm), 'minus'),\n      wfLine('− Эквайринг (обработка оплаты, ≈1%)', '−' + rub(exAcq), 'minus'),\n      wfLine('− Логистика и доставка покупателю', '−' + rub(exLog), 'minus'),\n      wfLine('− Хранение на складе', '−' + rub(exStore), 'minus'),\n      wfLine('= Осталось до рекламы и налога', rub(exMargin), 'total'),\n      wfLine('− Реклама (в среднем на одну продажу)', '−' + rub(exAds), 'minus'),\n      wfLine('= Прибыль до налога', rub(exProfit), 'final')\n    ];\n\n    // unit calculator (interactive)\n    const commRub = uPrice * uComm / 100;\n    const margin = uPrice - uCogs - commRub - uOther;\n    const profit = margin - uAds;\n    const pct = uPrice > 0 ? Math.round(profit / uPrice * 100) : 0;\n    const profitable = profit >= 0;\n    const uFinalStyle = {\n      marginTop: '14px', borderRadius: '14px', padding: '18px 20px', textAlign: 'center', color: '#fff',\n      background: profitable ? 'linear-gradient(135deg,#0a1f18,#06243f)' : 'linear-gradient(135deg,#7a1c1c,#c0392b)',\n      border: profitable ? '1px solid rgba(87,224,143,.3)' : '1px solid rgba(255,122,122,.45)',\n      boxShadow: profitable ? '0 0 26px rgba(87,224,143,.18)' : '0 0 30px rgba(255,91,91,.35)',\n      transition: 'background .35s ease'\n    };\n\n    return {\n      funnelStages: this.funnelStages, conversions: this.conversions, offlineMap: this.offlineMap,\n      economics: this.economics, levers, matrixRows: this.matrixData, expenses: this.expenses, waterfall,\n\n      imp, ctr, cr1, cr2, buy,\n      vImp: fmt(imp), vCtr: ctr.toFixed(1) + '%', vCr1: cr1 + '%', vCr2: cr2 + '%', vBuy: buy + '%',\n      cImp: fmt(imp), cClick: fmt(click), cCart: fmt(cart), cOrd: fmt(ord), cBuy: fmt(bu),\n      wImp: wf(imp), wClick: wf(click), wCart: wf(cart), wOrd: wf(ord), wBuy: wf(bu),\n      kCtr: conv(ctr.toFixed(1), ctr < 2), kCr1: conv(cr1, cr1 < 15), kCr2: conv(cr2, cr2 < 20), kBuy: conv(buy, false),\n      total: (ctr / 100 * cr1 / 100 * cr2 / 100 * buy / 100 * 100).toFixed(3) + '%',\n      setImp: this.setImp, setCtr: this.setCtr, setCr1: this.setCr1, setCr2: this.setCr2, setBuy: this.setBuy,\n\n      uPrice, uCogs, uComm, uOther, uAds,\n      setUPrice: this.setUPrice, setUCogs: this.setUCogs, setUComm: this.setUComm, setUOther: this.setUOther, setUAds: this.setUAds,\n      oPrice: rub(uPrice), oCogs: '−' + rub(uCogs), oComm: '−' + rub(commRub), oOther: '−' + rub(uOther),\n      oMargin: rub(margin), oAds: '−' + rub(uAds), oProfit: (profit < 0 ? '−' : '') + rub(profit),\n      oProfitPct: profitable ? ('прибыль до налога · ' + pct + '% от цены') : ('УБЫТОК · ' + pct + '% от цены — продаёшь в минус'),\n      uFinalStyle,\n\n      q1: this.buildQuiz(1), q2: this.buildQuiz(2)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
